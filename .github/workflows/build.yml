# 🛡️ Vardr — Build & Push image to ghcr.io
# Polyrepo CI pattern (same as Forseti, Bifrost, ...)

name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: vardr

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/megawiz-dev-team/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/megawiz-dev-team/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-success:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ build failed"; exit 1
          fi
          echo "✅ build passed"
